<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rule 110 Debug</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: monospace; color: #fff; padding: 10px; }
        #info { margin-bottom: 10px; }
        #canvas { border: 1px solid #333; display: block; }
    </style>
</head>
<body>
    <div id="info">Testing Rule 110 visualization...</div>
    <canvas id="canvas"></canvas>

    <script>
        // Same Rule 110 implementation as the main demo
        const rule = { '111':0, '110':1, '101':1, '100':0, '011':1, '010':1, '001':1, '000':0 };
        function step(s) { return s.map((c,i) => rule[`${i>0?s[i-1]:0}${c}${i<s.length-1?s[i+1]:0}`]); }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cellSize = 4;

        // Test pattern: single 1 in the middle
        let state = Array(50).fill(0);
        state[25] = 1;

        let history = [state.slice()];
        const maxSteps = 30;

        // Generate evolution
        for (let i = 0; i < maxSteps; i++) {
            state = step(state);
            history.push(state.slice());
        }

        // Set canvas size
        canvas.width = history[0].length * cellSize;
        canvas.height = history.length * cellSize;

        // Draw
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let step = 0; step < history.length; step++) {
            const state = history[step];
            const y = step * cellSize; // Time flows DOWNWARD

            for (let x = 0; x < state.length; x++) {
                if (state[x]) {
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(x * cellSize, y, cellSize, cellSize);
                }
            }
        }

        // Add labels
        ctx.fillStyle = '#ff6';
        ctx.font = '12px monospace';
        ctx.fillText('SPACE →', canvas.width - 60, canvas.height - 5);
        ctx.fillText('↓ TIME', 5, 15);

        ctx.fillStyle = '#fff';
        ctx.fillText(`Rule 110: ${history.length} steps, ${history[0].length} cells wide`, 5, canvas.height - 20);

        document.getElementById('info').textContent =
            `Generated ${history.length} time steps. Time flows DOWNWARD (top to bottom). ` +
            `Space flows LEFT TO RIGHT (left to right). Pattern: single cell evolution.`;
    </script>
</body>
</html>
