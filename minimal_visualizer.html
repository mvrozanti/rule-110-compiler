<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rule 110 Verified Adder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050508;
            color: #ccc;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            padding: 25px;
            min-height: 100vh;
        }
        
        h1 {
            font-size: 20px;
            font-weight: normal;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 12px;
            margin-bottom: 25px;
        }
        
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .controls input {
            width: 70px;
            padding: 12px;
            font-size: 20px;
            text-align: center;
            background: #0a0a0f;
            border: 2px solid #333;
            color: #fff;
            font-family: inherit;
        }
        
        .controls input:focus {
            outline: none;
            border-color: #4af;
        }
        
        .controls .op {
            font-size: 22px;
            color: #555;
        }
        
        .controls .result {
            font-size: 28px;
            color: #0f0;
            font-weight: bold;
            min-width: 60px;
        }
        
        .controls .status {
            font-size: 12px;
            margin-left: 10px;
        }
        
        .controls .status.correct { color: #0f0; }
        .controls .status.wrong { color: #f44; }
        
        .stats {
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
        }
        
        .stats strong { color: #0f0; }
        
        .bit-section {
            margin-bottom: 30px;
        }
        
        .bit-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: #0a0a12;
            border-left: 3px solid #4af;
        }
        
        .bit-header h2 {
            font-size: 14px;
            font-weight: normal;
            color: #fff;
        }
        
        .bit-header .formula {
            font-size: 12px;
            color: #888;
        }
        
        .bit-header .formula .val { color: #0af; }
        .bit-header .result-preview {
            font-size: 13px;
            margin-left: auto;
        }
        .bit-header .result-preview .sum { color: #0f0; }
        .bit-header .result-preview .carry { color: #f80; }
        
        .gates-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .gate-box {
            background: #08080c;
            border: 1px solid #222;
            padding: 12px;
            min-width: 180px;
        }
        
        .gate-box:hover {
            border-color: #444;
        }
        
        .gate-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .gate-formula {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
        }
        
        .gate-formula .op { color: #f80; }
        .gate-formula .val { color: #0af; }
        .gate-formula .result { color: #0f0; font-weight: bold; }
        
        .gate-grid {
            display: flex;
            flex-direction: column;
            background: #000;
        }
        
        .gate-row {
            display: flex;
            height: 2px;
        }
        
        .gate-cell {
            width: 2px;
            height: 2px;
            background: #111;
        }
        
        .gate-cell.alive {
            background: #4a8;
        }
        
        .gate-cell.input {
            background: #036 !important;
        }
        .gate-cell.input.alive {
            background: #08f !important;
        }
        
        .gate-cell.output {
            background: #303 !important;
        }
        .gate-cell.output.alive {
            background: #a0f !important;
        }
        
        .legend {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 11px;
            color: #888;
        }
        
        .legend .swatch {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-right: 5px;
            vertical-align: middle;
        }
        
        .summary {
            background: #0a0a10;
            border: 1px solid #333;
            padding: 20px;
            margin-top: 30px;
            max-width: 600px;
        }
        
        .summary h3 {
            font-size: 14px;
            color: #fff;
            margin-bottom: 15px;
            font-weight: normal;
        }
        
        .summary-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 12px;
        }
        
        .summary-row .bit-label {
            color: #666;
            width: 50px;
        }
        
        .summary-row .bit-value {
            color: #0f0;
            font-weight: bold;
        }
        
        .summary-row .carry-value {
            color: #f80;
            font-size: 11px;
        }
        
        .final-result {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
            font-size: 14px;
        }
        
        .final-result .value {
            color: #0f0;
            font-size: 20px;
            font-weight: bold;
        }
        
        .collapse-btn {
            background: none;
            border: 1px solid #444;
            color: #888;
            padding: 4px 10px;
            font-size: 11px;
            cursor: pointer;
            margin-left: 15px;
        }
        
        .collapse-btn:hover {
            color: #fff;
            border-color: #666;
        }
        
        .gates-row.collapsed {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Rule 110 Verified Adder</h1>
    <p class="subtitle">Each gate is a REAL Rule 110 cellular automaton computation • 100% accuracy verified</p>
    
    <div class="controls">
        <input type="number" id="a" value="3" min="0" max="15">
        <span class="op">+</span>
        <input type="number" id="b" value="5" min="0" max="15">
        <span class="op">=</span>
        <span class="result" id="result">8</span>
        <span class="status correct" id="status">✓ Verified</span>
    </div>
    
    <div class="stats" id="stats"></div>
    
    <div class="legend">
        <span><span class="swatch" style="background:#08f"></span>Input cells</span>
        <span><span class="swatch" style="background:#a0f"></span>Output cell</span>
        <span><span class="swatch" style="background:#4a8"></span>Active cells</span>
    </div>
    
    <div id="computation"></div>
    
    <div class="summary" id="summary"></div>

    <script>
        // Rule 110 implementation
        const RULE = {
            '111': 0, '110': 1, '101': 1, '100': 0,
            '011': 1, '010': 1, '001': 1, '000': 0
        };
        
        function step(state) {
            return state.map((c, i) => {
                const l = i > 0 ? state[i-1] : 0;
                const r = i < state.length-1 ? state[i+1] : 0;
                return RULE[`${l}${c}${r}`];
            });
        }
        
        function run(state, steps) {
            const history = [state.slice()];
            for (let i = 0; i < steps; i++) {
                state = step(state);
                history.push(state.slice());
            }
            return history;
        }
        
        // Verified gate configurations
        const GATES = {
            XOR: { inputs: [20, 22], output: 8, steps: 15, width: 50 },
            AND: { inputs: [15, 16], output: 1, steps: 25, width: 40 },
            OR: { inputs: [15, 16], output: 6, steps: 10, width: 40 }
        };
        
        function runGate(type, inputValues) {
            const gate = GATES[type];
            const state = new Array(gate.width).fill(0);
            
            gate.inputs.forEach((pos, i) => {
                state[pos] = inputValues[i];
            });
            
            const history = run(state, gate.steps);
            const output = history[history.length - 1][gate.output];
            
            return { output, history, gate };
        }
        
        function fullAdderBit(a, b, carryIn) {
            const operations = [];
            
            // XOR(a, b) -> partial sum
            const xor1 = runGate('XOR', [a, b]);
            operations.push({
                type: 'XOR',
                inputs: [a, b],
                output: xor1.output,
                label: `${a} ⊕ ${b} = ${xor1.output}`,
                desc: 'partial sum',
                history: xor1.history,
                gate: xor1.gate
            });
            
            // XOR(partial, carry) -> sum
            const xor2 = runGate('XOR', [xor1.output, carryIn]);
            operations.push({
                type: 'XOR',
                inputs: [xor1.output, carryIn],
                output: xor2.output,
                label: `${xor1.output} ⊕ ${carryIn} = ${xor2.output}`,
                desc: 'sum bit',
                history: xor2.history,
                gate: xor2.gate
            });
            
            // AND(a, b) -> partial carry
            const and1 = runGate('AND', [a, b]);
            operations.push({
                type: 'AND',
                inputs: [a, b],
                output: and1.output,
                label: `${a} ∧ ${b} = ${and1.output}`,
                desc: 'partial carry',
                history: and1.history,
                gate: and1.gate
            });
            
            // AND(partial, carry) -> carry contribution
            const and2 = runGate('AND', [xor1.output, carryIn]);
            operations.push({
                type: 'AND',
                inputs: [xor1.output, carryIn],
                output: and2.output,
                label: `${xor1.output} ∧ ${carryIn} = ${and2.output}`,
                desc: 'carry contrib',
                history: and2.history,
                gate: and2.gate
            });
            
            // OR(partial carry, carry contrib) -> carry out
            const or1 = runGate('OR', [and1.output, and2.output]);
            operations.push({
                type: 'OR',
                inputs: [and1.output, and2.output],
                output: or1.output,
                label: `${and1.output} ∨ ${and2.output} = ${or1.output}`,
                desc: 'carry out',
                history: or1.history,
                gate: or1.gate
            });
            
            return {
                sum: xor2.output,
                carry: or1.output,
                operations
            };
        }
        
        function add(a, b, bits = 4) {
            let result = 0;
            let carry = 0;
            const bitResults = [];
            let totalOps = 0;
            
            for (let i = 0; i <= bits; i++) {
                const bitA = (a >> i) & 1;
                const bitB = (b >> i) & 1;
                
                const adder = fullAdderBit(bitA, bitB, carry);
                result |= (adder.sum << i);
                
                bitResults.push({
                    bit: i,
                    a: bitA,
                    b: bitB,
                    carryIn: carry,
                    sum: adder.sum,
                    carryOut: adder.carry,
                    operations: adder.operations
                });
                
                totalOps += adder.operations.length;
                carry = adder.carry;
            }
            
            return { result, bitResults, totalOps };
        }
        
        function renderGateGrid(history, gate) {
            const container = document.createElement('div');
            container.className = 'gate-grid';
            
            const skipRows = Math.max(1, Math.floor(history.length / 15));
            
            for (let r = 0; r < history.length; r += skipRows) {
                const row = document.createElement('div');
                row.className = 'gate-row';
                
                const state = history[r];
                const isFirst = r === 0;
                const isLast = r >= history.length - skipRows;
                
                for (let c = 0; c < state.length; c++) {
                    const cell = document.createElement('span');
                    cell.className = 'gate-cell';
                    
                    if (state[c]) cell.classList.add('alive');
                    if (isFirst && gate.inputs.includes(c)) cell.classList.add('input');
                    if (isLast && c === gate.output) cell.classList.add('output');
                    
                    row.appendChild(cell);
                }
                
                container.appendChild(row);
            }
            
            return container;
        }
        
        function render() {
            const a = Math.min(15, Math.max(0, parseInt(document.getElementById('a').value) || 0));
            const b = Math.min(15, Math.max(0, parseInt(document.getElementById('b').value) || 0));
            const expected = a + b;
            
            const { result, bitResults, totalOps } = add(a, b);
            
            document.getElementById('result').textContent = result;
            
            const status = document.getElementById('status');
            if (result === expected) {
                status.textContent = '✓ Verified';
                status.className = 'status correct';
            } else {
                status.textContent = '✗ Error';
                status.className = 'status wrong';
            }
            
            document.getElementById('stats').innerHTML = 
                `<strong>${totalOps}</strong> Rule 110 gate operations • ` +
                `${bitResults.length} full adders • Each gate is a real CA computation`;
            
            // Render computation
            const comp = document.getElementById('computation');
            comp.innerHTML = '';
            
            for (const bitResult of bitResults) {
                if (bitResult.bit >= 4 && bitResult.sum === 0 && bitResult.carryOut === 0) continue;
                
                const section = document.createElement('div');
                section.className = 'bit-section';
                
                const header = document.createElement('div');
                header.className = 'bit-header';
                header.innerHTML = `
                    <h2>Bit ${bitResult.bit}</h2>
                    <span class="formula">
                        A[${bitResult.bit}]=<span class="val">${bitResult.a}</span>, 
                        B[${bitResult.bit}]=<span class="val">${bitResult.b}</span>, 
                        Carry=<span class="val">${bitResult.carryIn}</span>
                    </span>
                    <span class="result-preview">
                        → Sum=<span class="sum">${bitResult.sum}</span>, 
                        Carry=<span class="carry">${bitResult.carryOut}</span>
                    </span>
                    <button class="collapse-btn" onclick="toggleGates(this)">Hide gates</button>
                `;
                section.appendChild(header);
                
                const gatesRow = document.createElement('div');
                gatesRow.className = 'gates-row';
                
                for (const op of bitResult.operations) {
                    const box = document.createElement('div');
                    box.className = 'gate-box';
                    
                    const label = document.createElement('div');
                    label.className = 'gate-label';
                    label.textContent = `${op.type} gate (${op.desc})`;
                    box.appendChild(label);
                    
                    const formula = document.createElement('div');
                    formula.className = 'gate-formula';
                    formula.innerHTML = `<span class="val">${op.inputs[0]}</span> ` +
                        `<span class="op">${op.type === 'XOR' ? '⊕' : op.type === 'AND' ? '∧' : '∨'}</span> ` +
                        `<span class="val">${op.inputs[1]}</span> = ` +
                        `<span class="result">${op.output}</span>`;
                    box.appendChild(formula);
                    
                    box.appendChild(renderGateGrid(op.history, op.gate));
                    gatesRow.appendChild(box);
                }
                
                section.appendChild(gatesRow);
                comp.appendChild(section);
            }
            
            // Render summary
            const summary = document.getElementById('summary');
            let sumHtml = '<h3>Result Summary</h3>';
            
            for (const br of bitResults) {
                if (br.bit >= 4 && br.sum === 0) continue;
                sumHtml += `
                    <div class="summary-row">
                        <span class="bit-label">Bit ${br.bit}:</span>
                        <span class="bit-value">${br.sum}</span>
                        ${br.carryOut ? `<span class="carry-value">→ carry</span>` : ''}
                    </div>
                `;
            }
            
            const binary = result.toString(2).padStart(5, '0');
            sumHtml += `
                <div class="final-result">
                    Binary: <span class="value">${binary}</span> = 
                    Decimal: <span class="value">${result}</span>
                </div>
            `;
            
            summary.innerHTML = sumHtml;
        }
        
        function toggleGates(btn) {
            const row = btn.parentElement.nextElementSibling;
            row.classList.toggle('collapsed');
            btn.textContent = row.classList.contains('collapsed') ? 'Show gates' : 'Hide gates';
        }
        
        document.getElementById('a').addEventListener('input', render);
        document.getElementById('b').addEventListener('input', render);
        
        render();
    </script>
</body>
</html>
