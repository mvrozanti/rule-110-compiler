<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rule 110 Compiler</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0f;
            color: #b0b0b0;
            font-family: 'IBM Plex Mono', 'SF Mono', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
            gap: 1px;
            background: #1a1a22;
        }
        
        .header {
            grid-column: 1 / -1;
            background: #0d0d12;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid #1a1a22;
        }
        
        .header h1 {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            letter-spacing: 1px;
        }
        
        .header .tag {
            font-size: 10px;
            background: #1a3a1a;
            color: #4a4;
            padding: 3px 8px;
            border-radius: 3px;
        }
        
        .panel {
            background: #0d0d12;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .panel-header {
            padding: 10px 15px;
            background: #111118;
            border-bottom: 1px solid #1a1a22;
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .panel-content {
            flex: 1;
            overflow: auto;
            padding: 15px;
        }
        
        #editor {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #c0c0c0;
            font-family: inherit;
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }
        
        .btn {
            background: #1a1a25;
            border: 1px solid #333;
            color: #aaa;
            padding: 6px 14px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            border-radius: 3px;
        }
        
        .btn:hover { background: #252530; color: #fff; }
        .btn.primary { background: #1a3a2a; border-color: #2a5a3a; color: #4d4; }
        .btn.primary:hover { background: #2a4a3a; }
        
        .instructions-list {
            font-size: 12px;
        }
        
        .inst {
            display: flex;
            padding: 4px 8px;
            border-radius: 3px;
            margin-bottom: 2px;
        }
        
        .inst:hover { background: #151520; }
        .inst.current { background: #1a2a1a; }
        
        .inst-num {
            color: #555;
            width: 30px;
            text-align: right;
            margin-right: 10px;
        }
        
        .inst-op {
            color: #08a;
            width: 60px;
        }
        
        .inst-args { color: #888; }
        
        .inst-op.label { color: #a08; }
        .inst-op.jump { color: #a60; }
        .inst-op.print { color: #0a0; }
        
        .output-section {
            grid-column: 1 / -1;
            background: #0d0d12;
            border-top: 1px solid #1a1a22;
        }
        
        .output-content {
            display: flex;
            gap: 30px;
            padding: 15px 20px;
            align-items: flex-start;
        }
        
        .output-box {
            flex: 1;
        }
        
        .output-box h3 {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .output-values {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .output-value {
            background: #1a2a1a;
            color: #0f0;
            padding: 8px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 3px;
        }
        
        .registers {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            font-size: 11px;
        }
        
        .reg {
            background: #111118;
            padding: 5px 8px;
            text-align: center;
            border-radius: 3px;
        }
        
        .reg-name { color: #555; }
        .reg-val { color: #0af; font-weight: bold; }
        .reg.nonzero .reg-val { color: #0f0; }
        
        .gates-section {
            margin-top: 15px;
        }
        
        .gate-count {
            font-size: 12px;
            color: #666;
        }
        
        .gate-count strong {
            color: #0af;
            font-size: 18px;
        }
        
        .mini-gates {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .mini-gate {
            background: #111118;
            padding: 6px 10px;
            border-radius: 3px;
            font-size: 11px;
        }
        
        .mini-gate.xor { color: #08a; }
        .mini-gate.and { color: #a60; }
        .mini-gate.or { color: #80a; }
        
        .examples-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .example-btn {
            background: #151520;
            border: 1px solid #252530;
            color: #888;
            padding: 4px 10px;
            font-size: 10px;
            cursor: pointer;
            border-radius: 3px;
        }
        
        .example-btn:hover {
            background: #1a1a25;
            color: #fff;
        }
        
        .status {
            font-size: 11px;
            color: #666;
        }
        
        .status.success { color: #4a4; }
        .status.error { color: #a44; }
        
        .error-msg {
            background: #2a1515;
            border: 1px solid #3a2020;
            color: #f88;
            padding: 10px 15px;
            border-radius: 3px;
            font-size: 12px;
        }
        
        /* Full computation modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            overflow: auto;
        }
        
        .modal.show { display: block; }
        
        .modal-header {
            position: sticky;
            top: 0;
            background: #0a0a0f;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            z-index: 10;
        }
        
        .modal-header h2 {
            font-size: 14px;
            font-weight: normal;
            color: #fff;
        }
        
        .modal-header .close-btn {
            background: none;
            border: 1px solid #444;
            color: #888;
            padding: 5px 15px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .modal-header .close-btn:hover {
            color: #fff;
            border-color: #666;
        }
        
        .modal-content {
            padding: 20px;
        }
        
        .full-grid-container {
            background: #000;
            display: inline-block;
            padding: 10px;
        }
        
        .full-grid {
            display: flex;
            flex-direction: column;
        }
        
        .full-row {
            display: flex;
            height: 2px;
        }
        
        .full-cell {
            width: 1px;
            height: 2px;
            background: #111;
        }
        
        .full-cell.alive { background: #3a7; }
        .full-cell.xor { background: #08a; }
        .full-cell.xor.alive { background: #0cf; }
        .full-cell.and { background: #a60; }
        .full-cell.and.alive { background: #fa0; }
        .full-cell.or { background: #80a; }
        .full-cell.or.alive { background: #c0f; }
        
        .computation-stats {
            margin-bottom: 15px;
            font-size: 12px;
            color: #888;
        }
        
        .computation-stats strong { color: #fff; }
        
        .gate-separator {
            height: 1px;
            background: #333;
        }
        
        .download-btn {
            margin-left: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>RULE 110 COMPILER</h1>
            <span class="tag">Every operation computed by cellular automaton</span>
            <div class="examples-bar">
                <button class="example-btn" onclick="loadExample('add')">Add</button>
                <button class="example-btn" onclick="loadExample('factorial')">Factorial</button>
                <button class="example-btn" onclick="loadExample('fibonacci')">Fibonacci</button>
                <button class="example-btn" onclick="loadExample('gcd')">GCD</button>
                <button class="example-btn" onclick="loadExample('max')">Max</button>
                <button class="example-btn" onclick="loadExample('loop')">Loop Sum</button>
            </div>
            <button class="btn primary" onclick="compile()">▶ Run</button>
        </div>
        
        <div class="panel">
            <div class="panel-header">
                Source Code
                <span class="status" id="compile-status"></span>
            </div>
            <div class="panel-content">
                <textarea id="editor" spellcheck="false"># Factorial of 5
n = 5
result = 1
i = 1
while i <= n:
    result = result * i
    i = i + 1
print result</textarea>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-header">
                Compiled Instructions
                <span id="inst-count"></span>
            </div>
            <div class="panel-content">
                <div class="instructions-list" id="instructions"></div>
            </div>
        </div>
        
        <div class="output-section">
            <div class="output-content">
                <div class="output-box">
                    <h3>Output</h3>
                    <div class="output-values" id="output"></div>
                </div>
                
                <div class="output-box">
                    <h3>Registers</h3>
                    <div class="registers" id="registers"></div>
                </div>
                
                <div class="output-box gates-section">
                    <h3>Rule 110 Gates Executed</h3>
                    <div class="gate-count" id="gate-count"></div>
                    <div class="mini-gates" id="gates-viz"></div>
                    <button class="btn" id="show-full-btn" onclick="showFullComputation()" style="margin-top:10px">Show Full Computation</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-header">
            <h2>Full Rule 110 Computation</h2>
            <div>
                <span id="modal-stats"></span>
                <button class="btn download-btn" onclick="downloadImage()">Download PNG</button>
                <button class="close-btn" onclick="closeModal()">Close</button>
            </div>
        </div>
        <div class="modal-content">
            <div class="computation-stats" id="comp-stats"></div>
            <div class="full-grid-container">
                <canvas id="full-canvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Rule 110 implementation
        const RULE = {
            '111': 0, '110': 1, '101': 1, '100': 0,
            '011': 1, '010': 1, '001': 1, '000': 0
        };
        
        function r110Step(state) {
            const n = state.length;
            return state.map((c, i) => {
                const l = i > 0 ? state[i-1] : 0;
                const r = i < n-1 ? state[i+1] : 0;
                return RULE[`${l}${c}${r}`];
            });
        }
        
        function r110Run(state, steps) {
            for (let i = 0; i < steps; i++) {
                state = r110Step(state);
            }
            return state;
        }
        
        // Gate configurations
        const GATE_CONFIGS = {
            XOR: { pos: [15, 16], out: 7, steps: 10, width: 35 },
            AND: { pos: [10, 11], out: 1, steps: 25, width: 30 },
            OR: { pos: [10, 11], out: 1, steps: 10, width: 25 }
        };
        
        let gateLog = [];
        let gateHistories = [];
        
        function r110RunWithHistory(state, steps) {
            const history = [state.slice()];
            for (let i = 0; i < steps; i++) {
                state = r110Step(state);
                history.push(state.slice());
            }
            return { final: state, history };
        }
        
        function gate(type, a, b) {
            const cfg = GATE_CONFIGS[type];
            const state = new Array(cfg.width).fill(0);
            state[cfg.pos[0]] = a;
            state[cfg.pos[1]] = b;
            const { final, history } = r110RunWithHistory(state, cfg.steps);
            gateLog.push({ type, inputs: [a, b], output: final[cfg.out] });
            gateHistories.push({ type, history, width: cfg.width });
            return final[cfg.out];
        }
        
        const Gate = {
            xor: (a, b) => gate('XOR', a, b),
            and: (a, b) => gate('AND', a, b),
            or: (a, b) => gate('OR', a, b),
            not: (a) => gate('XOR', a, 1)
        };
        
        // ALU operations
        const ALU = {
            fullAdder(a, b, cin) {
                const xorAB = Gate.xor(a, b);
                const sum = Gate.xor(xorAB, cin);
                const cout = Gate.or(Gate.and(a, b), Gate.and(xorAB, cin));
                return [sum, cout];
            },
            
            add(a, b, bits = 8) {
                let result = 0, carry = 0;
                for (let i = 0; i < bits; i++) {
                    const [sum, cout] = this.fullAdder((a >> i) & 1, (b >> i) & 1, carry);
                    result |= (sum << i);
                    carry = cout;
                }
                return result & 0xFF;
            },
            
            sub(a, b, bits = 8) {
                let bInv = 0;
                for (let i = 0; i < bits; i++) {
                    bInv |= (Gate.not((b >> i) & 1) << i);
                }
                let result = 0, carry = 1;
                for (let i = 0; i < bits; i++) {
                    const [sum, cout] = this.fullAdder((a >> i) & 1, (bInv >> i) & 1, carry);
                    result |= (sum << i);
                    carry = cout;
                }
                return result & 0xFF;
            },
            
            and(a, b, bits = 8) {
                let result = 0;
                for (let i = 0; i < bits; i++) {
                    result |= (Gate.and((a >> i) & 1, (b >> i) & 1) << i);
                }
                return result;
            },
            
            or(a, b, bits = 8) {
                let result = 0;
                for (let i = 0; i < bits; i++) {
                    result |= (Gate.or((a >> i) & 1, (b >> i) & 1) << i);
                }
                return result;
            },
            
            xor(a, b, bits = 8) {
                let result = 0;
                for (let i = 0; i < bits; i++) {
                    result |= (Gate.xor((a >> i) & 1, (b >> i) & 1) << i);
                }
                return result;
            },
            
            eq(a, b, bits = 8) {
                const xorResult = this.xor(a, b, bits);
                let result = 1;
                for (let i = 0; i < bits; i++) {
                    result = Gate.and(result, Gate.not((xorResult >> i) & 1));
                }
                return result;
            },
            
            lt(a, b, bits = 8) {
                for (let i = bits - 1; i >= 0; i--) {
                    const bitA = (a >> i) & 1;
                    const bitB = (b >> i) & 1;
                    if (bitA !== bitB) return bitB;
                }
                return 0;
            },
            
            gt(a, b) { return this.lt(b, a); },
            le(a, b) { return Gate.not(this.gt(a, b)); },
            ge(a, b) { return Gate.not(this.lt(a, b)); },
            ne(a, b) { return Gate.not(this.eq(a, b)); }
        };
        
        // Compiler
        class Compiler {
            constructor() {
                this.vars = {};
                this.nextReg = 0;
                this.insts = [];
                this.labelNum = 0;
            }
            
            newLabel(prefix = 'L') {
                return `${prefix}${++this.labelNum}`;
            }
            
            allocReg(name) {
                if (!(name in this.vars)) {
                    if (this.nextReg >= 13) throw new Error('Out of registers');
                    this.vars[name] = this.nextReg++;
                }
                return this.vars[name];
            }
            
            getReg(name) {
                if (!(name in this.vars)) throw new Error(`Undefined: ${name}`);
                return this.vars[name];
            }
            
            emit(op, ...args) {
                this.insts.push({ op, args });
            }
            
            ensureInReg(val) {
                val = val.trim();
                if (/^\d+$/.test(val)) {
                    this.emit('LOAD', 14, parseInt(val));
                    return 14;
                }
                return this.getReg(val);
            }
            
            parseExpr(expr, dest) {
                expr = expr.trim();
                if (/^\d+$/.test(expr)) {
                    this.emit('LOAD', dest, parseInt(expr));
                    return;
                }
                if (expr in this.vars) {
                    if (this.vars[expr] !== dest) this.emit('MOV', dest, this.vars[expr]);
                    return;
                }
                if (expr.startsWith('~')) {
                    const src = this.ensureInReg(expr.slice(1));
                    this.emit('NOT', dest, src);
                    return;
                }
                
                const ops = [
                    ['==', 'EQ'], ['!=', 'NE'], ['<=', 'LE'], ['>=', 'GE'],
                    ['<', 'LT'], ['>', 'GT'],
                    ['+', 'ADD'], ['-', 'SUB'], ['*', 'MUL'], ['/', 'DIV'],
                    ['&', 'AND'], ['|', 'OR'], ['^', 'XOR']
                ];
                
                for (const [opStr, opName] of ops) {
                    const idx = expr.indexOf(opStr);
                    if (idx !== -1) {
                        const left = this.ensureInReg(expr.slice(0, idx));
                        const right = this.ensureInReg(expr.slice(idx + opStr.length));
                        this.emit(opName, dest, left, right);
                        return;
                    }
                }
                
                throw new Error(`Cannot parse: ${expr}`);
            }
            
            parseBlock(lines, start, baseIndent) {
                const block = [];
                let i = start;
                while (i < lines.length) {
                    const line = lines[i];
                    if (!line.trim()) { i++; continue; }
                    const indent = line.length - line.trimStart().length;
                    if (indent <= baseIndent && line.trim()) break;
                    block.push(line);
                    i++;
                }
                return [block, i];
            }
            
            compileBlock(lines) {
                let i = 0;
                while (i < lines.length) {
                    const line = lines[i];
                    const stripped = line.trim();
                    if (!stripped || stripped.startsWith('#')) { i++; continue; }
                    
                    const indent = line.length - line.trimStart().length;
                    
                    if (stripped.startsWith('while ') && stripped.endsWith(':')) {
                        const cond = stripped.slice(6, -1).trim();
                        const [block, newI] = this.parseBlock(lines, i + 1, indent);
                        this.compileWhile(cond, block);
                        i = newI;
                        continue;
                    }
                    
                    if (stripped.startsWith('if ') && stripped.endsWith(':')) {
                        const cond = stripped.slice(3, -1).trim();
                        const [ifBlock, newI] = this.parseBlock(lines, i + 1, indent);
                        let elseBlock = [];
                        let endI = newI;
                        if (newI < lines.length && lines[newI].trim() === 'else:') {
                            [elseBlock, endI] = this.parseBlock(lines, newI + 1, indent);
                        }
                        this.compileIf(cond, ifBlock, elseBlock);
                        i = endI;
                        continue;
                    }
                    
                    this.compileLine(stripped);
                    i++;
                }
            }
            
            compileWhile(cond, body) {
                const start = this.newLabel('WHILE');
                const end = this.newLabel('ENDWHILE');
                this.emit('LABEL', start);
                this.compileCondition(cond, end);
                this.compileBlock(body);
                this.emit('JUMP', start);
                this.emit('LABEL', end);
            }
            
            compileIf(cond, ifBlock, elseBlock) {
                const elseLabel = this.newLabel('ELSE');
                const endLabel = this.newLabel('ENDIF');
                this.compileCondition(cond, elseLabel);
                this.compileBlock(ifBlock);
                if (elseBlock.length) this.emit('JUMP', endLabel);
                this.emit('LABEL', elseLabel);
                if (elseBlock.length) {
                    this.compileBlock(elseBlock);
                    this.emit('LABEL', endLabel);
                }
            }
            
            compileCondition(cond, jumpIfFalse) {
                for (const [opStr, opName] of [['==', 'EQ'], ['!=', 'NE'], ['<=', 'LE'], ['>=', 'GE'], ['<', 'LT'], ['>', 'GT']]) {
                    const idx = cond.indexOf(opStr);
                    if (idx !== -1) {
                        const left = this.ensureInReg(cond.slice(0, idx));
                        const right = this.ensureInReg(cond.slice(idx + opStr.length));
                        this.emit(opName, 15, left, right);
                        this.emit('JZ', 15, jumpIfFalse);
                        return;
                    }
                }
                const val = this.ensureInReg(cond);
                this.emit('JZ', val, jumpIfFalse);
            }
            
            compileLine(line) {
                if (!line || line.startsWith('#')) return;
                if (line.startsWith('print ')) {
                    const val = line.slice(6).trim();
                    if (/^\d+$/.test(val)) {
                        this.emit('PRINT_LIT', parseInt(val));
                    } else {
                        this.emit('PRINT', this.getReg(val));
                    }
                    return;
                }
                if (line.includes('=')) {
                    const [destName, expr] = line.split('=', 2);
                    const dest = this.allocReg(destName.trim());
                    this.parseExpr(expr, dest);
                    return;
                }
                throw new Error(`Cannot parse: ${line}`);
            }
            
            compile(source) {
                this.vars = {};
                this.nextReg = 0;
                this.insts = [];
                this.labelNum = 0;
                this.compileBlock(source.split('\n'));
                return this.insts;
            }
        }
        
        // VM
        class VM {
            constructor() {
                this.regs = new Array(16).fill(0);
                this.output = [];
                this.labels = {};
            }
            
            run(insts) {
                this.regs.fill(0);
                this.output = [];
                this.labels = {};
                gateLog = [];
                gateHistories = [];
                
                insts.forEach((inst, i) => {
                    if (inst.op === 'LABEL') this.labels[inst.args[0]] = i;
                });
                
                let pc = 0;
                let steps = 0;
                const maxSteps = 100000;
                
                while (pc < insts.length && steps++ < maxSteps) {
                    const inst = insts[pc];
                    const [a, b, c] = inst.args;
                    
                    switch (inst.op) {
                        case 'LABEL': pc++; break;
                        case 'LOAD': this.regs[a] = b & 0xFF; pc++; break;
                        case 'MOV': this.regs[a] = this.regs[b]; pc++; break;
                        case 'ADD': this.regs[a] = ALU.add(this.regs[b], this.regs[c]); pc++; break;
                        case 'SUB': this.regs[a] = ALU.sub(this.regs[b], this.regs[c]); pc++; break;
                        case 'MUL': 
                            let prod = 0;
                            for (let i = 0; i < this.regs[c]; i++) prod = ALU.add(prod, this.regs[b]);
                            this.regs[a] = prod & 0xFF;
                            pc++;
                            break;
                        case 'DIV':
                            let dividend = this.regs[b], divisor = this.regs[c], quot = 0;
                            while (divisor > 0 && dividend >= divisor) {
                                dividend = ALU.sub(dividend, divisor);
                                quot++;
                            }
                            this.regs[a] = quot;
                            pc++;
                            break;
                        case 'AND': this.regs[a] = ALU.and(this.regs[b], this.regs[c]); pc++; break;
                        case 'OR': this.regs[a] = ALU.or(this.regs[b], this.regs[c]); pc++; break;
                        case 'XOR': this.regs[a] = ALU.xor(this.regs[b], this.regs[c]); pc++; break;
                        case 'NOT': this.regs[a] = ALU.xor(this.regs[b], 0xFF); pc++; break;
                        case 'EQ': this.regs[a] = ALU.eq(this.regs[b], this.regs[c]); pc++; break;
                        case 'NE': this.regs[a] = ALU.ne(this.regs[b], this.regs[c]); pc++; break;
                        case 'LT': this.regs[a] = ALU.lt(this.regs[b], this.regs[c]); pc++; break;
                        case 'GT': this.regs[a] = ALU.gt(this.regs[b], this.regs[c]); pc++; break;
                        case 'LE': this.regs[a] = ALU.le(this.regs[b], this.regs[c]); pc++; break;
                        case 'GE': this.regs[a] = ALU.ge(this.regs[b], this.regs[c]); pc++; break;
                        case 'JUMP': pc = this.labels[a]; break;
                        case 'JZ': pc = this.regs[a] === 0 ? this.labels[b] : pc + 1; break;
                        case 'PRINT': this.output.push(this.regs[a]); pc++; break;
                        case 'PRINT_LIT': this.output.push(a); pc++; break;
                        default: pc++;
                    }
                }
                
                return this.output;
            }
        }
        
        const EXAMPLES = {
            add: `# Simple addition
a = 10
b = 25
c = a + b
print c`,
            factorial: `# Factorial of 5
n = 5
result = 1
i = 1
while i <= n:
    result = result * i
    i = i + 1
print result`,
            fibonacci: `# Fibonacci sequence
n = 10
a = 0
b = 1
i = 0
while i < n:
    print a
    temp = a + b
    a = b
    b = temp
    i = i + 1`,
            gcd: `# GCD of 48 and 18
a = 48
b = 18
while a != b:
    if a > b:
        a = a - b
    else:
        b = b - a
print a`,
            max: `# Maximum of two numbers
x = 15
y = 23
if x > y:
    print x
else:
    print y`,
            loop: `# Sum 1 to 10
sum = 0
i = 1
while i <= 10:
    sum = sum + i
    i = i + 1
print sum`
        };
        
        function loadExample(name) {
            document.getElementById('editor').value = EXAMPLES[name];
        }
        
        function compile() {
            const source = document.getElementById('editor').value;
            const status = document.getElementById('compile-status');
            const instsDiv = document.getElementById('instructions');
            const instCount = document.getElementById('inst-count');
            const outputDiv = document.getElementById('output');
            const regsDiv = document.getElementById('registers');
            const gateCountDiv = document.getElementById('gate-count');
            const gatesVizDiv = document.getElementById('gates-viz');
            
            try {
                const compiler = new Compiler();
                const insts = compiler.compile(source);
                
                // Show instructions
                instsDiv.innerHTML = insts.map((inst, i) => {
                    let opClass = '';
                    if (inst.op === 'LABEL') opClass = 'label';
                    else if (inst.op.startsWith('J')) opClass = 'jump';
                    else if (inst.op.startsWith('PRINT')) opClass = 'print';
                    
                    return `<div class="inst">
                        <span class="inst-num">${i}</span>
                        <span class="inst-op ${opClass}">${inst.op}</span>
                        <span class="inst-args">${inst.args.join(', ')}</span>
                    </div>`;
                }).join('');
                
                instCount.textContent = `${insts.length} instructions`;
                
                // Run
                const vm = new VM();
                const output = vm.run(insts);
                
                // Show output
                outputDiv.innerHTML = output.length 
                    ? output.map(v => `<span class="output-value">${v}</span>`).join('')
                    : '<span style="color:#555">(no output)</span>';
                
                // Show registers
                regsDiv.innerHTML = vm.regs.slice(0, 16).map((v, i) => 
                    `<div class="reg ${v ? 'nonzero' : ''}">
                        <span class="reg-name">R${i}</span>
                        <span class="reg-val">${v}</span>
                    </div>`
                ).join('');
                
                // Show gate stats
                const gateCounts = { XOR: 0, AND: 0, OR: 0 };
                gateLog.forEach(g => gateCounts[g.type]++);
                
                gateCountDiv.innerHTML = `<strong>${gateLog.length}</strong> total gates executed`;
                gatesVizDiv.innerHTML = Object.entries(gateCounts)
                    .filter(([_, c]) => c > 0)
                    .map(([t, c]) => `<span class="mini-gate ${t.toLowerCase()}">${t}: ${c}</span>`)
                    .join('');
                
                status.textContent = '✓ Compiled & executed';
                status.className = 'status success';
                
            } catch (e) {
                status.textContent = '✗ Error';
                status.className = 'status error';
                instsDiv.innerHTML = `<div class="error-msg">${e.message}</div>`;
                outputDiv.innerHTML = '';
            }
        }
        
        function showFullComputation() {
            if (gateHistories.length === 0) {
                alert('No computation to show. Run a program first.');
                return;
            }
            
            // Limit to first 500 gates for performance
            const maxGates = 500;
            const histories = gateHistories.slice(0, maxGates);
            const truncated = gateHistories.length > maxGates;
            
            // Calculate dimensions
            const gateWidth = 40; // pixels per gate width
            const rowHeight = 2;
            const gapBetweenGates = 1;
            
            // Arrange gates in a grid
            const gatesPerRow = Math.ceil(Math.sqrt(histories.length * 2));
            const numRows = Math.ceil(histories.length / gatesPerRow);
            
            // Find max steps and width
            const maxSteps = Math.max(...histories.map(h => h.history.length));
            const maxWidth = Math.max(...histories.map(h => h.width));
            
            const cellW = 2;
            const cellH = 2;
            const gatePixelWidth = maxWidth * cellW + gapBetweenGates;
            const gatePixelHeight = maxSteps * cellH + gapBetweenGates;
            
            const canvasWidth = gatesPerRow * gatePixelWidth;
            const canvasHeight = numRows * gatePixelHeight;
            
            const canvas = document.getElementById('full-canvas');
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            const ctx = canvas.getContext('2d');
            
            // Background
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            
            // Colors by gate type
            const colors = {
                XOR: { bg: '#001828', alive: '#0af' },
                AND: { bg: '#281800', alive: '#fa0' },
                OR: { bg: '#180028', alive: '#c0f' }
            };
            
            // Draw each gate
            histories.forEach((gate, idx) => {
                const col = idx % gatesPerRow;
                const row = Math.floor(idx / gatesPerRow);
                const offsetX = col * gatePixelWidth;
                const offsetY = row * gatePixelHeight;
                
                const { bg, alive } = colors[gate.type];
                
                gate.history.forEach((state, step) => {
                    state.forEach((cell, x) => {
                        const px = offsetX + x * cellW;
                        const py = offsetY + step * cellH;
                        ctx.fillStyle = cell ? alive : bg;
                        ctx.fillRect(px, py, cellW - 0.5, cellH - 0.5);
                    });
                });
            });
            
            // Update stats
            const totalCells = histories.reduce((sum, g) => sum + g.history.length * g.width, 0);
            document.getElementById('comp-stats').innerHTML = 
                `<strong>${histories.length}</strong> gate computations` +
                (truncated ? ` (showing first ${maxGates} of ${gateHistories.length})` : '') +
                ` | <strong>${totalCells.toLocaleString()}</strong> total CA cells computed` +
                ` | Canvas: ${canvasWidth} × ${canvasHeight} pixels`;
            
            document.getElementById('modal-stats').textContent = 
                `${histories.length} gates`;
            
            document.getElementById('modal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }
        
        function downloadImage() {
            const canvas = document.getElementById('full-canvas');
            const link = document.createElement('a');
            link.download = 'rule110-computation.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        // Close modal on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
        
        // Initial compile
        compile();
    </script>
