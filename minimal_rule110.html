<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Minimal Rule 110 Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: monospace; color: #fff; padding: 20px; }
        #controls { margin-bottom: 20px; }
        button { background: #333; border: 1px solid #666; color: #fff; padding: 8px 16px; margin: 0 5px; cursor: pointer; }
        button:hover { background: #555; }
        #canvas { border: 1px solid #333; display: block; margin-top: 20px; }
        #info { margin-top: 10px; color: #ccc; }
    </style>
</head>
<body>
    <h1>Minimal Rule 110 Test</h1>
    <p>This shows pure Rule 110 evolution with NO fancy visualization - just the raw cellular automaton.</p>

    <div id="controls">
        Pattern:
        <select id="pattern">
            <option value="single">Single Cell</option>
            <option value="glider">Glider Pattern</option>
            <option value="random">Random</option>
            <option value="block">Block of Cells</option>
        </select>
        <button onclick="reset()">Reset</button>
        <button onclick="step()">Step</button>
        <button onclick="run()">Run</button>
        <button onclick="stop()">Stop</button>
    </div>

    <canvas id="canvas"></canvas>

    <div id="info">
        <div>Pattern: <span id="pattern-name">Single Cell</span></div>
        <div>Step: <span id="step-count">0</span></div>
        <div>Active cells: <span id="active-count">0</span></div>
        <div>Time flows DOWNWARD (top = past, bottom = future)</div>
        <div>Space flows LEFT TO RIGHT</div>
    </div>

    <script>
        // Rule 110 implementation
        const rule = { '111':0, '110':1, '101':1, '100':0, '011':1, '010':1, '001':1, '000':0 };
        function step(s) { return s.map((c,i) => rule[`${i>0?s[i-1]:0}${c}${i<s.length-1?s[i+1]:0}`]); }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cellSize = 3;

        // Patterns
        const patterns = {
            single: () => {
                const state = Array(80).fill(0);
                state[40] = 1;
                return state;
            },
            glider: () => [0, 1, 1, 0, 1, 1, 1, 0, 0, 1, 1, 1],
            random: () => Array.from({length: 80}, () => Math.random() > 0.8 ? 1 : 0),
            block: () => {
                const state = Array(80).fill(0);
                for (let i = 35; i < 45; i++) state[i] = 1;
                return state;
            }
        };

        let currentState = patterns.single();
        let history = [currentState.slice()];
        let running = false;
        let animationId;

        function resizeCanvas() {
            canvas.width = currentState.length * cellSize;
            canvas.height = Math.min(history.length, 200) * cellSize;
        }

        function draw() {
            resizeCanvas();

            // Clear
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw history
            for (let step = 0; step < history.length; step++) {
                const state = history[step];
                const y = step * cellSize;

                for (let x = 0; x < state.length; x++) {
                    if (state[x]) {
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(x * cellSize, y, cellSize, cellSize);
                    }
                }
            }

            // Draw time markers
            ctx.fillStyle = '#666';
            ctx.font = '10px monospace';
            for (let step = 0; step < history.length; step += 10) {
                const y = step * cellSize + cellSize;
                ctx.fillText(`t=${step}`, 5, y);
            }

            // Draw arrows
            ctx.fillStyle = '#ccc';
            ctx.font = '12px monospace';
            ctx.fillText('SPACE →', canvas.width - 60, 15);
            ctx.fillText('↓ TIME', 5, canvas.height - 5);

            updateInfo();
        }

        function updateInfo() {
            document.getElementById('step-count').textContent = history.length - 1;
            document.getElementById('active-count').textContent = currentState.filter(x => x).length;
        }

        function reset() {
            const patternName = document.getElementById('pattern').value;
            currentState = patterns[patternName]();
            history = [currentState.slice()];
            document.getElementById('pattern-name').textContent = patternName;
            draw();
        }

        function step() {
            if (history.length >= 200) return; // Limit history
            currentState = step(currentState);
            history.push(currentState.slice());
            draw();
        }

        function run() {
            if (running) return;
            running = true;
            function animate() {
                if (!running || history.length >= 200) {
                    stop();
                    return;
                }
                step();
                animationId = requestAnimationFrame(animate);
            }
            animate();
        }

        function stop() {
            running = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        }

        // Initialize
        document.getElementById('pattern').addEventListener('change', reset);
        reset();
    </script>
</body>
</html>
