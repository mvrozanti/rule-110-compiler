<!DOCTYPE html>
<html>
<head>
    <title>Test Visualizer</title>
</head>
<body>
    <h1>Testing Visualizer Logic</h1>
    <div id="test-results"></div>
    
    <script>
        // Copy the key functions from visualizer.html
        const rule110Table = {
            '111': 0, '110': 1, '101': 1, '100': 0,
            '011': 1, '010': 1, '001': 1, '000': 0
        };

        function rule110Step(state) {
            const next = [];
            const n = state.length;
            for (let i = 0; i < n; i++) {
                const left = i > 0 ? state[i - 1] : 0;
                const center = state[i];
                const right = i < n - 1 ? state[i + 1] : 0;
                next.push(rule110Table[`${left}${center}${right}`]);
            }
            return next;
        }

        function encodeBinary(value, bits = 8) {
            return value.toString(2).padStart(bits, '0').split('').map(b => parseInt(b));
        }

        function compileArithmeticOp(op, a, b) {
            const encodedA = encodeBinary(a, 8);
            const encodedB = encodeBinary(b, 8);
            const separator = [0, 0, 0, 0];
            const outputMarker = [1, 1];
            const padding = new Array(9).fill(0);
            const state = [...encodedA, ...separator, ...encodedB, ...outputMarker, ...padding];
            const outputOffset = encodedA.length + separator.length + encodedB.length + outputMarker.length;
            
            const regions = [
                { start: 0, end: encodedA.length, label: 'A' },
                { start: encodedA.length + separator.length, 
                  end: encodedA.length + separator.length + encodedB.length, 
                  label: 'B' },
                { start: outputOffset, end: outputOffset + 9, label: 'Out' }
            ];
            
            return { state, regions };
        }

        function parseOperation(operationCode) {
            const arithMatch = operationCode.match(/arith:(\w+)\((.*?)\)/);
            if (arithMatch) {
                const op = arithMatch[1].toLowerCase();
                const args = arithMatch[2].split(',').map(a => parseInt(a.trim()));
                const compiled = compileArithmeticOp(op, args[0], args[1]);
                
                let result;
                if (op === 'add') result = args[0] + args[1];
                else if (op === 'subtract') result = args[0] - args[1];
                else if (op === 'multiply') result = args[0] * args[1];
                
                return { ...compiled, type: 'arith', op, args, result };
            }
            throw new Error('Invalid operation');
        }

        // Tests
        const tests = [];
        
        // Test 1: Parse arith:add(15, 31)
        try {
            const op1 = parseOperation('arith:add(15, 31)');
            tests.push({
                name: 'Parse arith:add(15, 31)',
                pass: op1.result === 46 && op1.state.length === 30,
                details: `Result: ${op1.result}, State length: ${op1.state.length}, Regions: ${op1.regions.length}`
            });
        } catch (e) {
            tests.push({ name: 'Parse arith:add(15, 31)', pass: false, details: e.message });
        }

        // Test 2: Check initial state encoding
        try {
            const op2 = parseOperation('arith:add(5, 3)');
            const expected15 = encodeBinary(15, 8);
            const expected31 = encodeBinary(31, 8);
            tests.push({
                name: 'Binary encoding',
                pass: expected15.join('') === '00001111' && expected31.join('') === '00011111',
                details: `15 = ${expected15.join('')}, 31 = ${expected31.join('')}`
            });
        } catch (e) {
            tests.push({ name: 'Binary encoding', pass: false, details: e.message });
        }

        // Test 3: Rule 110 step function
        try {
            const testState = [1, 1, 0];
            const nextState = rule110Step(testState);
            tests.push({
                name: 'Rule 110 step',
                pass: Array.isArray(nextState) && nextState.length === 3,
                details: `${testState.join('')} -> ${nextState.join('')}`
            });
        } catch (e) {
            tests.push({ name: 'Rule 110 step', pass: false, details: e.message });
        }

        // Test 4: Multiple steps
        try {
            const op3 = parseOperation('arith:add(1, 1)');
            let state = [...op3.state];
            const history = [state];
            for (let i = 0; i < 5; i++) {
                state = rule110Step(state);
                history.push([...state]);
            }
            tests.push({
                name: 'Multiple steps evolution',
                pass: history.length === 6 && history[0].length === history[5].length,
                details: `History length: ${history.length}, State length: ${history[0].length}`
            });
        } catch (e) {
            tests.push({ name: 'Multiple steps evolution', pass: false, details: e.message });
        }

        // Test 5: Region identification
        try {
            const op4 = parseOperation('arith:add(10, 20)');
            const indexToRegionId = {};
            op4.regions.forEach((region, regionId) => {
                for (let i = region.start; i < region.end; i++) {
                    indexToRegionId[i] = regionId;
                }
            });
            const regionCount = Object.keys(indexToRegionId).length;
            tests.push({
                name: 'Region identification',
                pass: regionCount > 0 && op4.regions.length === 3,
                details: `Total cells in regions: ${regionCount}, Number of regions: ${op4.regions.length}`
            });
        } catch (e) {
            tests.push({ name: 'Region identification', pass: false, details: e.message });
        }

        // Display results
        const resultsDiv = document.getElementById('test-results');
        let html = '<h2>Test Results:</h2><ul>';
        let passCount = 0;
        tests.forEach(test => {
            const status = test.pass ? '✓ PASS' : '✗ FAIL';
            const color = test.pass ? 'green' : 'red';
            html += `<li style="color: ${color}"><strong>${test.name}:</strong> ${status} - ${test.details}</li>`;
            if (test.pass) passCount++;
        });
        html += `</ul><p><strong>${passCount}/${tests.length} tests passed</strong></p>`;
        resultsDiv.innerHTML = html;

        // Also log to console
        console.log('Test Results:', tests);
    </script>
</body>
</html>
